<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publicaciones con Votos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Publicaciones con Votos</h1>
            <p>Publica mensajes con archivos y comparte contenido genial con tu comunidad.</p>
        </header>
    
    <div id="nameSection" class="card">
        <label for="userName">Ingresa tu nombre:</label>
        <input type="text" id="userName" placeholder="Tu nombre">
        <button id="confirmName" class="primary">Confirmar Nombre</button>
    </div>
    
    <div id="postSection" class="card" style="display: none;">
        <h2>Crear Publicación</h2>
        <label for="message">Mensaje:</label>
        <textarea id="message" placeholder="Escribe tu mensaje aquí..." rows="4"></textarea>
        
        <label for="fileInput">Cargar Archivo (imagen, PDF, documento, etc.):</label>
        <input type="file" id="fileInput" multiple accept="image/*,.pdf,.doc,.docx,.txt,.zip,.xlsx,.xls" />
        
        <div id="filePreview" class="file-preview" style="display: none;">
            <strong>Archivos seleccionados:</strong>
            <div id="fileList"></div>
            <button id="clearFiles" class="secondary">Limpiar Archivos</button>
        </div>
        
        <img id="imagePreview" />
        
        <button id="postMessage" class="primary">Publicar Mensaje con Archivos</button>
    </div>
    
    <div id="posts"></div>

        <footer class="footer">
            Creador de páginas épicas con archivos y votos ✨
        </footer>
    </div>

    <script src="helpers.js"></script>
    <script src="script.js"></script>
</body>
</html>
